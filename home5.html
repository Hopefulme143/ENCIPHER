<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

        .six{

        }
        .seven{
        }
    </style>
</head>

    <div class="hdiv">
        <div style="background-color: blue;">A</div>
        <div style="background-color: aqua;">B</div>
        <div style="background-color: cadetblue;">C</div>
    </div><br><br>
        <div class="cdiv">
